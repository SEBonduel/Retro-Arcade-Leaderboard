name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  sast:
    name: Analyse de securite (SAST)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/nodejs

  audit:
    name: Audit des dependances
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm audit --audit-level=high

  docker-scan:
    name: Scan image Docker
    runs-on: ubuntu-latest
    needs: [lint, tests, sast, audit]
    steps:
      - uses: actions/checkout@v4
      - name: Build image Docker
        run: docker build -t arcade-api .
      - name: Scan avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: arcade-api
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
